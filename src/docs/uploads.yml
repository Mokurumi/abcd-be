components:
  schemas:
    Upload:
      type: object
      properties:
        _id:
          type: string
        owner:
          type: string
        label:
          type: string
        type:
          type: string
          enum: ["document", "image", "video", "other"]
        docURL:
          type: string
        public_id:
          type: string
        category:
          type: string
          enum: ["PROFILE_IMG"]
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      example:
        _id: 5ebac534954b54139806c112
        owner: 5ebac534954b54139806c112
        label: Profile Image
        type: image
        docURL: https://res.cloudinary.com/example/image/upload/v1/PROFILE_IMG/sample.jpg
        public_id: PROFILE_IMG/sample
        category: PROFILE_IMG
        createdBy: 5ebac534954b54139806c112

  responses:
    DuplicateUpload:
      description: Upload already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: 400
            message: Upload already exists

/uploads/userProfileImage:
  post:
    operationId: uploadUserProfileImage
    summary: Upload a user profile image
    tags: [Uploads]
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - file
              - owner
            properties:
              file:
                type: string
                format: binary
              owner:
                type: string
    responses:
      '201':
        description: Upload successful
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                message:
                  type: string
      '400':
        $ref: '#/components/responses/DuplicateUpload'
      '401':
        $ref: '#/components/responses/Unauthorized'

/uploads/deleteUserProfileImage/{userId}:
  delete:
    operationId: deleteUserProfileImage
    summary: Delete a user profile image
    tags: [Uploads]
    security:
      - bearerAuth: []
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
    responses:
      '204':
        description: Deleted
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        $ref: '#/components/responses/Forbidden'
      '404':
        $ref: '#/components/responses/NotFound'

/uploads/{owner}:
  parameters:
    - name: owner
      in: path
      required: true
      schema:
        type: string
      description: Owner ID (user ID)

  get:
    operationId: getUploadsByOwner
    summary: Get uploads for an owner
    tags: [Uploads]
    security:
      - bearerAuth: []
    parameters:
      - name: category
        in: query
        schema:
          type: string
          enum: ["PROFILE_IMG"]
      - name: type
        in: query
        schema:
          type: string
          enum: ["document", "image", "video", "other"]
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: size
        in: query
        schema:
          type: integer
          default: 10
      - name: sortBy
        in: query
        schema:
          type: string
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                results:
                  type: array
                  items:
                    $ref: '#/components/schemas/Upload'
                totalPages:
                  type: number
                totalResults:
                  type: number
                page:
                  type: number
                size:
                  type: number
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        $ref: '#/components/responses/Forbidden'

/uploads/deleteUploads/{owner}/{category}:
  delete:
    operationId: deleteUploadsByCategory
    summary: Delete all uploads for an owner by category
    tags: [Uploads]
    security:
      - bearerAuth: []
    parameters:
      - name: owner
        in: path
        required: true
        schema:
          type: string
      - name: category
        in: path
        required: true
        schema:
          type: string
          enum: ["PROFILE_IMG"]
    responses:
      '204':
        description: Deleted
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        $ref: '#/components/responses/Forbidden'
      '404':
        $ref: '#/components/responses/NotFound'

/uploads/deleteUpload/{owner}/{uploadId}:
  delete:
    operationId: deleteUploadById
    summary: Delete a single upload by ID
    tags: [Uploads]
    security:
      - bearerAuth: []
    parameters:
      - name: owner
        in: path
        required: true
        schema:
          type: string
      - name: uploadId
        in: path
        required: true
        schema:
          type: string
    responses:
      '204':
        description: Deleted
      '401':
        $ref: '#/components/responses/Unauthorized'
      '403':
        $ref: '#/components/responses/Forbidden'
      '404':
        $ref: '#/components/responses/NotFound'
